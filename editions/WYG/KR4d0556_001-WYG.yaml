body:
  text: 青村遺稿元金涓撰序送楊仲章歸東陽詩卷序楊君仲章以清峻修敏之質好學不倦窮討六籍雖晚登先師黄文獻公之門而强記卓識邁倫逸等一時學者咸推先登宋君景濓每稱之曰能而先師亦自謂不意晚年復得此友如涓者愚弗能砭頑弗能訂安敢望其末光也哉重自念四方士人登先師之門者無有不立名成業涓自幼年侍側時則有陳君時甫呉君立夫李君仲倫朱君元達朝夕講論文字辨析義理涓未始或能識知也既而時甫居東陽以明經授徒常數十百人弟子不逺千里而至其高第弟子則有張君良金為江浙鄉舉易魁凢為舉子之業者無不宗焉立夫以庚申嵗中鄉試榜仲倫以茂才異等用大臣薦為校官惟元達豪俠不覊藐視進取以學問文章同逰浙西者三十餘年雖虞栁諸公薦書交上亦睥睨弗顧也後數年先師提舉江浙儒學時則有劉君子實哲君子正應君之邵陳君子中肄業西湖書院劉哲二君皆登上第應則兩中鄉舉榜陳回河南授試主司見其文反疑其為南人代筆之作由是失利而返則抑欝不得志卒於錢塘先師銘其墓焉迨夫先師告老致事而歸則有宋君景濂許君存仁王君子充以英敏絶人之學一時咸集文名德業超出前軰今則皆居要路宻邇清光所謂立名成業真足以承前引後嗚呼盛哉夫何朱君伯清傅君國章與吾仲章氏皆以妙年傑學才器局幹以出入乎諸君之間逐逐焉不以印組為務忒忒焉不以文章自髙晦光隠徳逸志抗雲逈出人表比辟書及門伯清以居制不出國章以母老懇辭仲章則先事適機以自潛時知縣胡公子實方興學校以導民奉幣致請仲章為弟子師迎焉以偹其敬館焉以具其禮無幾何致辭而歸咸贈之以詩去則隠於東陽南溪之濵閉門絶客束書問農文不留稿詩不贈人與涓不相聞問者寥寥四五載矣今其季仲齊授徒法興精舎涓適見此卷慨後生之可畏嗟良覿之難逢痛念先師之不可復作矣因撫卷興思先師以晚年得此友為喜而涓亦以晚年得友斯人為竒則先師道業之傳宗而主之者有其人予復何憂遂并叙此意於巻端以寓夫乆要不忘之意云仲章見之其必有以知我屬望之深意也七言古詩和吳正傳五臺懐古韻姑蘓臺闔閭城畔姑蘓臺百花洲上千花開笙歌半空曉未絶一聲落月啼烏來蛾眉顰翠愁如簇空捧春嬌在心曲滄江羅網縱鯨鯢碧瓦坵墟走麋鹿悽煙慘日潮生䖏怨滿鴟夷猶不悟甬東東海不可棲劍光夜冷呉山路章華臺楚臺雲棟連天宇伯氣憑陵横九土方㑹諸侯求鼎時天下無周而有楚一朝呉蔡兵合謀孤舟江路誰從逰宫花曉露細腰泣空山落日餓鬼愁春風過眼秋蕭瑟䬼人一飯那能得道傍塊土棲草烟夜寒夢落空臺前朝陽臺楚王昔日逰臺上前望巫峯近相向青楓錦石叢古祠暮雨朝雲依疊嶂蔓花古木多春寒翆幃仙佩非人間神功治水佐禹跡至今石刻巍如山詞臣錯寫高唐賦剛道朝雲夢中遇千尺黄湍洗不清水聲猶望臺前怒黄金臺昭王有志興宗社厚幣卑辭禮賢者郭君一語捐千金國士争趨駢駟馬燕臺計議皆英豪齊人蹴踏猶兒曹三軍旗幟白日動半空劍氣青雲髙樂生既去士亦少回首春風長芳草火牛遂復七十城恨滿臺荒天地老戯馬臺將軍逐馬闗中來神威掠地風雲摧鴻門舞劍成敵國彭城衣錦登空臺馳下漢軍何披靡垓下楚歌相應起山河百二幾諸侯子弟八千無一騎古來天下誰英䧺荒臺老樹悲秋風符命合歸赤帝子項伯不忠范增死五言律詩和楊仲齊韻光明清絶地物色藉詩描野鼠拱虚穴山蜂歸早朝閑庭翻芍藥枯木引陵苕鼻觀香風入移時獨未消其二雲嶠無榮辱林泉得浸滛瀑飛晴雨散風奏曉龍吟大葉長莖苿枯枝老樹林吾行忽過此殊喜得幽尋其三渴飲空中露饑飡石上霞夜茶烹玉液春酒釀松花自謂得仙術不知老嵗華請看梳櫛䖏斑白照窗紗其四溪行欲假履雲坐不須冠樹宻一天小樓髙六月寒袈裟憎客至魍魉喜人看惟有松無意風來即奏弹自述疆埸正多故山林成乆留據鞍皆戰馬扣角且歌牛清德交逰冷光眀詩思浮從今脱塵濁自可鄙公侯春興菜甲時堪摘柴荆晝不開鑿渠通水道度地覔花栽旅食憑儒術春愁仗酒盃却憎塵世薄徒爾暫徘徊其二落落相如志悠悠王粲悲乾坤猶甲胄耕鑿且年時伐木開新逕引泉添小池箇中非所適排悶且裁詩其三草閣成遷次春來景物新杖藜時野外把釣即溪濵夜雨桑麻足東風草木勻闗河阻南北何䖏問通津秋夜四望秋無際凭欄夜未央星榆晴舞葉月桂冷飛香人澹琴心苦林幽鶴夢長此情當此夕誰肯賞凄涼山莊青村溪盡䖏林宻隠孤莊石老莓苔路門荒薜荔墻人行秋業滑鶴立晚松涼治畝農歸後蓑衣掛夕陽江村寂寂江村路輕烟晚自生遠峯晴見色獨樹煖無聲渚鷺行看水溪魚賣入城孤舟人不渡兩岸夕陽眀錢塘行在鳳舞龍飛䖏寒煙半野蒿地卑東海近天逺北辰髙來徃春秋燕盈虗日夜潮老僧年八十對客話前朝伍員廟東出昭闗日倉皇去路遥漁人憐贈劍市吏識吹簫楚郢鞭荒墓呉江起怒潮因思臣子節千古一魂消舟次漁浦雙溪東入浙終日坐危舟流水逺眀目小蓬低壓頭煙村鴉入暮江國雁賔秋一片淒涼景安排獨客愁浙江曉渡片㠶風力飽涼氣碧颼颼江濶欲沉雁天空惟見秋漁歌聞四起人影在中流隔望秦峯出東南第一洲舟次嚴灘八月桐江曲青蘋未著花亂雲低壓樹細水淺流沙到郭無多路依山有幾家故人成逺别相望各天涯雨後書懐畏俗乆不出其如此意何鬢毛詩白盡山色雨青多曲偃行蛇草圓生浴鳥波與誰專一壑同和採芝歌康湖山居康湖環十里半世樂吟身白屋居寒士青山是故人松多天不暑瀑近地無塵頗得漁樵趣生涯日又新送人回剡華川逰未遍又作剡中㳺詩海珊瑚月書田苜蓿秋行山時借屐訪雪夜乗舟别後懐人處清風獨倚樓别徐處士歸嚴州浙水連天白輕㠶帶雨飛榻懸髙士去釣在故人歸秋盡雁初過江空魚正肥君如招伴隠我正欲相依别友人歸衢爛柯山下路猿鳥待多時今伴少㣲隠何愁太史知葛陂龍化早遼海鶴歸遅為問山中叟如今幾局棋送友曉發赴北荒雞三唱後河漢正西流太白孤星曉中華大野秋樹低江郭遠風急草煙收此去金臺上觀光樂勝逰客中與友人言别同是􅄔中人情親若弟兄客邉今識面詩上已聞名驛栁分春逺山花照晚眀相逢即相别流水幾多情旅懐江湖為客久歸計與誰論春色草無路雨聲人閉門薄衣知酒煖眼病覺燈昏蜀水家邉景連宵役夢魂江樓有見睡起無忙事寒多不下樓櫓聲和雁去江影照人愁山碧雲初曉林紅葉正秋琴書無恙否我欲問歸舟山園即事暖日麗亭臺山屏四面開與誰行樂去有客伴吟來鳳舞摩挲竹龍蟠屹崛梅春風似相識終日共徘徊自述索居三十載一硯鐵穿磨學淺非時用人生奈老何竹房來暝早花塢聚春多静坐無餘事門前水自波次楊仲齊韻端坐無時事春秋讀聖經逐風驚退鷁隕石看飛星自謂心將憒何期眼倍青獲麟應絶筆三歎動虚靈其二空谷開雲葉清池曵水衣堦苔掃不盡山果摘還稀長嘯妨僧定徐行看月輝獮猴庭下過擾亂静中機其三書巢何所有香縷散紛紜眀月將梅到虚樓看夜分僧歸驚卧犬錫落破層雲語及外間事令人不敢聞村居荒草無行路人家隔小溪雨多嵐氣重石少水聲低病鶴依松立寒雞傍砌啼近來渾懶動静處欲幽栖對客對客談清話相忘酒一壺吟腸傾大白醉額㟁輕烏午飣新虀韭秋厨活膾鱸眀朝重有約一笑過康湖亂中自述汨汨兵猶競凄凄興莫賒嬌兒將學語稚子慣烹茶亂後添新鬼春歸發舊花十年湖海志羈思滿天涯其二幽居隣水竹避地獨柴門白日琴書浄春風燕雀喧看山頻矮屐適興任芳樽天地軍麾滿詩成自朗吟其三園林春已半茅屋日初長水動魚兒出花飛燕子忙看雲閒坐石把酒濕征裳落落當年恨髙歌竟欲狂其四春夢猶為客題詩發興清風帘茅店酒晴日栁橋鶯親老頻歸覲時危未息兵況來招隠計擬問鹿門行蜀墅頭溪頭自舒散天澹夕陽㣲拂石松邉坐看雲水上飛舊磯雙鷺下小棹一漁歸不覺吟成乆苔㾗濕上衣雲門道中三月山南路村村呌杜鵑白雲千嶂曉斜月一溪烟水冷長松井春香小薺田何時移别業來徃繡湖邉秋夜有感苦吟人不寐中夜啟幽扉明月霜初下西風葉正稀家貧豚有子天冷客無衣感事忽如夢孤螢入我幃暮秋懐歸西風三徑菊秋晚正花開家逺書難寄天寒雁未來青山如舊識白眼妬竒才遥憶浯溪路年年長緑苔七言律詩用仲敬先生折桂韻金印懸腰不用黄丹溪垂釣亦何傷舟移鷺㸃青山破笛弄梅飄白雪香月裏版圖窺窄窄望中鴻鵠去茫茫蕭曹不是逢隆凖未必姓名千載芳夜宿青陂爲愛青陂甚瀟洒二三杖屨樂徘徊道人櫂雪今何在野老牽衣不放囬别塢犬聲風送至誰家梅影月偷來卜鄰若許成茅屋日種芝蘭千百栽用前韵復春谷道人春谷無塵宜笑傲蜀山有路可徘徊蛟龍得雨翻猶卧鵰鶚横秋又早囬放艇幾同漁父去看棋時許野樵來洞前更約東風轉仙李碧桃随意栽用楊仲章兵字廬字韻林森劍㦸立天兵不礙琴書嘉遯情李愿釣鮮情自逸謝安補屐興何清岩房罷磬銷香篆石壁題詩紀姓名我欲相從無羽翼秋風雞黍約佳盟其二不向人間結草廬任他城市務贏餘飽飡薇蕨泉中水過眼牙籖架上書嵐氣著牕雲影過鐘聲入夢曙光初髙居自與禪機㑹何害門稀長者車山行望望峯巒紫翠凝杖藜補屐謾登登樵歌谷静聲相荅雨霽林香氣欲蒸行樂可無詩似錦從容那用酒如澠何當擺脱塵中慮許我移家共作朋寄許存仁存禮金華有客負材豐搜抉神竒奪化工愛酒何殊陶栗里隠居真似陸龜䝉欲知晴日鶯花䖏盡入新詩品藻中江漢夕烽然未息莫将心事較窮通其二年來無事學休糧蜀墅溪頭有草堂幾度瞻雲思棣蕚清宵看月坐藤床侵晨處士烟霞疾慙愧才人錦繡腸樗散聲名甘寂寞從教詩句只尋常寄友人宋邦彦故人别後見尤難彼此詩盟尚未寒寧暇對床論契濶漫勞折簡報平安春山裂竹愁如海流水落花紅滿灘九十春光都過了諸君何以罄交懽寄胡希顔伐木有詩誰善賦嚶嚶喚起逺相求白沙翠竹一村曉錦樹黄花滿野秋雪夜艱難呼檜楫晴風容易下書樓獨憐浩浩多真樂不似棲棲藴積憂重逰光明寺梵王宫闕倚崔嵬積翠繽紛圖畫開啼鳥避人穿樹去老僧迎客下山來裁詩石逕書青竹散髪雲林卧緑苔自識箇中幽興熟杖藜何惜重徘徊送李子威之金陵金陵自古帝王州䇿馬飄然作勝逰一代衣冠新禮樂六朝文物昔風流此時送别詩盈軸何處相思月滿樓若見潛溪宋夫子勿云江漢有扁舟秋興摇落頻驚節序催亂離懐復向誰開江山滚滚紅塵暗霜露凄凄白雁來䧺劍醉提時慷慨矮衣屢舞起徘徊近聞幕府徵豪傑當代誰為濟世才題楊伯容竹居最愛君家竹居好秋花錦石相新鮮窗前讀易無俗子林下置酒多才賢寳鴨晝焚香滿室鐵笛夜吹聲在天安得卜鄰近左右與君日日談詩篇送楊仲齊之武川訓導聞道琴書行有日臨岐送别意何如蒲萄酒羙盃初泛楊栁條新葉未舒春入杏壇朝鼔瑟雨餘芹泮水生魚定知别後遥相憶毋惜頻頻逺寄書春暮客中述懐幽窗寂寂問音踈牢落干戈且讀書芳草王孫歸未得青春客子意何如花殘樹底園收果水落溪頭人買魚爲問紛紛當路者飛騰還肯顧蟾蜍㑹胡原道馮原輔溪飲溪流一曲石爲城中有廽瀾分外清金盞縈紆天上泛玉盤宛轉鏡中行日髙松影侵衣碎風綻楊花落㡌輕我軰固知文字飲鳳笙龍管向誰鳴野歩有感書寄城中黄上舎新晴野歩踏青暉萬緑枝頭可染衣流水小橋通野澗斜風飛絮㸃苔磯春歸别駕憑誰管儒負虚名與願違惆悵年華更迭易達人何事不知機喜雨寄楊伯容江城曉夜雨浪浪併作芳齋六月涼倚杖出門田父樂題詩呼酒野人狂不愁戰地多兵甲遂喜豐年足稻粱問訊草𤣥亭上客竹林踈簟夢秋光秋暮㑹楊仲章矮褐凄涼淹别館故人一見話綢繆溪頭水落魚龍夜塞北雲深鼔角秋爛醉豈知猶是酒相逢誰為不封侯江湖眀日重分手滿眼西風獨倚樓贈術士吕公短褐垂綸已十載柴扉篳竇即湖邊年來出處常存道身外功名懶問天造次可無詩入聖相逢還有酒為賢虎頭燕頷君休論好向山隂買釣船自歎雀聲催我過湖西日暮歸來看藥畦耄老不思安樂土問人何處托幽棲白雲出岫心何在仙鶴離巢樹欠低携取琴書便歸去奚煩更待杜䳌啼贈陳仲玉本學教諭致仕聴雨芹池二十年如何一旦捲青氊陡令猿鶴生秋怨髙枕琴書且晝眠詩為懶題閑木筆飯因不足羡苔錢石田茒屋華川曲從此挑燈繡佛前清徳晚歸酒留詩戀意遅遅回到中途已落暉小蹇引秋行落葉老漁隈冷坐危磯山間眀月随人出松外閒雲伴鶴歸試問夜深何處宿欲從山下扣禪扉方學士招飲不赴我在林間鹿與羣君為天上玉麒麟莫将綵樹燈前酒來醉梅花月下人白屋不生三閣夢青山那識五陵青行吟每到看松處自有漁樵作主賔小齋世道非時懶屈人小齋容膝且安貧河圗不出空歌鳳魯史將終遇獲麟雲掩松窗低結暝水行花徑曲流春近來頗得幽閒趣幾夜青山入夢頻秋江話别别酒相傾别淚流江流亦不為君留片㠶今夜人何處眀月滿天誰共樓一雁呌霜紅入葉十年為客白侵頭莫嫌歸計多蕭索三徑西風菊正秋送楊學諭還浦江萍迹相逢又一年小樓情味共凄然半窗燈影看書坐四壁秋聲聴雨眠浦汭暮雲迷去雁樵溪春水憶歸船重逰莫負華山約須趂梅花早著鞭贈王隠君叔誠投老江湖作隠君鳳來龍去絶無聞孤山梅近閒吟月九里松深穏卧雲書屋幾畨留鶴守釣磯一半與鷗分摛文染藻風流處可似蘭亭王右軍送張學諭歸三衢穏泛靈槎訪斗牛未容歸伴赤松逰蓴鱸此去無千里雞黍相期在幾秋瀔水月寒梅入夢繡湖煙澹栁分愁春風莫問田園計須趂功名在黒頭金華史學録回永嘉鴈蕩青衫洗盡泮宫塵三載琴書又問津海濶正憐鴻去逺山深須遣鴈來頻沈郎風月詩俱瘦謝老池塘草自春莫笑廣文官獨冷長安一日看花人寄王照磨季畊底事鄉心憶鏡湖一朝歸去伴樵漁傳家尚喜貧存硯教子尤勤老著書静裏有時觀水坐閑來何處買山居門􅉹桃李應如舊添得春風栁五株贈星命周雲峯元是濂溪别一峯蒼寒高卓五雲中中蔵月窟無人到試躡天根有路通絶頂隂晴分上下半空星斗繞西東我來欲問元元理吹起扶摇九萬風送金華應學録回天台華髮青衫寂寞官泮芹香煖客氊寒仙源乆憶胡麻飯書館羞餐苜蓿盤洞裏碧桃春自醉樓前眀月夜誰看好風若有西來便願寫相思寄彩鸞送東陽杜僉憲之河南號尺五翁玉堂學士草堂仙濟世英才間世賢憂國正撡言事筆移官又買載書船風摶渤澥三千水雲擁蓬萊尺五天更到鳳池春好䖏紫微香煖御爐煙悼開元洞天沈羽士隔世仙靈不可招栁烟愁鎻赤䦨橋蒼蛟有血遺金劍丹鳳無音卧玉簫洞冷石墟雲氣濕樹枯雷剥火文焦舊時風月今何在空見芳園長藥苗三訪僧潛谷不遇有詩謝予就韻以荅槁木心形大雅姿我求相見話襟期三生石上尋盟乆一片雲間識面遅梅下有童空放鶴屋邊無竹可留詩因知雪夜人囬棹豈是無心顧少㣲送僧歸天竺錫影孤飛下十峯定知分住翆芙蓉巖雲曉伏叅禪虎溪雨晴収入鉢龍香洗供花吟對月清浮談麈坐依松我來欲遂林泉約金碧樓臺第幾重送楊志仁之浙西僉憲玉骨秋神鐵石心風流如此世無羣乾坤千古有清氣河嶽一時生白雲蚌腹月眀珠迸彩鳳毛春暖錦成文此行别有調羮信湖上梅花為報君雪霽偶作無事身閒睡起遅開門天霽已多時村醪待熱未紅火野客忍寒先白詩氷照梅花㣲有影雪摧松樹半無枝笑呼稚子隣家問昨夜魚歸未賣誰自述獨倚層樓眼界寛天風吹濕到䦨干驚人好句愁中得濟世方書病後看庭樹雪崩時一響瓶花凍合夜多寒江南景物今凋弊誰想蒼生望治安分韻得春字分得新題賦未成暖風香散玉爐塵樓臺無月不宜夜天地有梅先得春世路近年難獨客好山随處著閑人何如寄傲南窗下學戴淵明漉酒巾夜泊蘭江江山歴朗雪初融坐見宵分碧落空世景固知光霽少人生多在别離中影随月下成三友春到梅邊第一風此夕此情聊復醉馬蹄明日又西東秋日山中不記秋風幾日晴偶來林下見雲生野梧半脱無多影山雉驚飛忽一聲短錫引船僧渡水小輿聨擔客歸城溪頭聴得漁翁説近日前村酒價平秋日客中久客歸來静閉門秋風落葉自紛紛夜來一煖做成雨早起滿溪流出雲山色祗宜閒裏看鴈聲那可客中聴黄花開遍歸無計吟老秋光又幾分富陽舟中終日推篷對酒盃漁郎隔浦棹歌囬路旁古屋無人住山下踈梅獨自開幾䖏汀洲分鴈下滿江風雨送潮來白頭篙叟休相促眀日天晴上釣臺城中歸志喜城郭多時得一歸小園幽館雅相宜種荷池暝便鷗睡儲粟瓶空慮鶴饑兩屐苔痕人立處一軒秋影月來時静中自得其中理此意無人㑹得知曉發金華一帶寒林古木齊濛濛樹色亂雲迷沿村問酒難尋店隔岸呼舟欲渡溪夜雨草深蛙鼓閙曉風花落子規啼可憐客路多岑寂何處垂楊駐馬蹄村舎幾村桑柘逺相連村北村南小渡船茅屋有縁臨水住閑身無事看山眠孤林欲暮鴉争樹一雨及時人種田昨夜鄰翁喜相報今年依舊是豐年山莊值嵗暮坐久那能笑口開篆烟燒盡石爐灰山厨度臈貧無肉茅屋逢春富有梅凍鳥縮身依雪立饑驢直耳望人來牕前更展離騷讀消得茶甌當酒盃客中寄丁景行半生書劍惜分隂誰想飄零素髮侵朋社有盟鷗聚散客鄉無信鴈浮沉潮囬斷岸沙痕淺月落幽池樹影深歸計未成愁入夢一燈空伴壁間琴春日過繡湖湖上晴光麗物華行行幽興浩無涯林頭新店去沽酒門外小盆來賣花天氣可非三令節春風多在五侯家茅菴兀坐無餘事静看逰蜂報午衙喜林達民至相交十載不相踈只數能詩一老逋曲徑不縁花落掃清尊端為客來沽剪將春韭露華濕吟到寒梅月影孤對飲不妨􅂸爛熳務求鄉誼重如初林下荅王仲實韻林下黄茅屋數椽門前流水一漁船酒懐近日頻中聖詩骨何時可換仙生計喜添供鶴料閒身幸結住山縁客來不話功名事且誦莊生第一篇西湖偶作見説西湖多勝事六橋景物似當年風前楊栁株株活雪後梅花樹樹鮮隔岸飛帘人賣酒臨堤撾鼔客逰船幾時遂我窮行樂載道烟塵祗自憐泊釣臺釣臺聳挿大江頭臺下悠悠水自流交友端居尊黼服先生高尚只羊裘空山落日哀猿嘯㫁㟁西風古木稠極目登樓頻悵望白雲飛盡碧天秋客中風雨述懐溪南連日雨昬昬客况難禁不出門山岳隂風靈氣伏江湖秋水怒濤奔乗槎乆待無邊使憂國徒懐奉至尊自起髙歌看寳劍大哉吾道許誰論其二謀生自歎一何愚弹鋏髙歌志强舒江海故人楊得意風塵多病馬相如買山何處堪歸隠為客經年廢讀書溪上曉晴新雨後且須沽酒慰躊蹰望天台日光紅䖏是天台萬壑千峯紫翠開滄海波濤時洶湧瓊樓石室自崔嵬丹邱霞酒憑誰遣緑水胡麻安再來東望長歌搔短髪秋風滿抱一登臺病後自吟地僻柴門少客過寂寥生計柰愁何秋來得雨涼偏早病起縁詩痩更多鶴立露枝黄墮葉鷗飛煙渚翠翻荷幾囬夢入江湖棹笑看雲山卧緑蓑秋興柴扉草閣小溪頭生理蕭然只釣舟鼉吼江湖千里浪雞鳴風雨五更秋漢家事業蕭何盛衛幕才名葛亮優極目天涯心緒亂婆娑窗下看魚鈎其二栖栖裋褐閉柴扃颯颯西風起洞庭曉樹著霜千葉赤秋虫懸戸一絲青雲昬塞北鴻書㫁水落湖頭戰血腥囬首可憐文物異誰能提劍發新硎逰佛堂石田級級黍離離野外招提野趣宜山色萬重青有待槿花一樹白無私得時豪傑誇身健老去飄零仗佛慈課罷出郊時極目不堪人事苦吟詩春日今年春日殊無頼不逐黄衫作伴逰學道十年心似醉懐人一别嵗如流殘山剩水塵凡隔瘴雨蠻烟日夜浮戰伐即今憐壯士功成誰擬覔封侯繡湖重逰繡湖八月景堪題士女扁舟尾尾齊白水青山圗畫裏淡煙踈雨夕陽西芙蓉濯濯偏臨鏡楊栁依依宻䕶堤滿眼浪濤終古事華川望㫁意都迷幽居自述小橋流水䕶柴荆門外青山適性情太痩却應詩思惱多愁莫放酒盃傾蕙蘭既植堪為佩松菊猶存不用名誰識箇中真樂趣偶来林下看雲生七言絶句山齋雪夜寄王叔野月滿中天雪滿村一琴窗下自温存溪頭應有人相訪只恐扁舟不到門舟中短蓬摇下雨長川山重寒雲樹重煙篷底筆床相對坐有人看作米家船秋夜獨自歸來秋夜静雨濕寒雲小窗暝竹爐無火渴思茶隔樹人家有燈影冬夜獨坐夜深人讀易屋外雪明如月色松寒老鶴睡不成飛下窗前伴人立春晴曉風吹暖破隂雲草色湖光轉緑㾗試看海棠枝上月定将花影到重門寄王可宗石鼎烹茶風繞林小亭面水足清吟只今酒禁嚴如許誰信香醪更可斟寄彦敬髙人歸隠久投簮日轉花隂睡正酣階下斑衣森玉立詩來猶説愛宜男逰赤松枕石聴流夢未安碧雲蘿薜古祠寒夜深鸞鶴羣仙過人在青松月下看其二桃花流水出紅塵洞口仙凡隔幾鄰劉阮若知人世換春風那肯問歸津其三金華三洞洞中天今日來逰信有縁丹井水寒瑤草碧白雲猶伴石羊眠其四琳宫玉宇鎻崔嵬絶頂松窗對月開昨夜仙翁騎鶴去五雲深䖏採芝囬村園半畝村園接水涯誅茅新搆小書齋窗前不用栽花栁只對青山景自佳春曉偶成清晨睡起覺衣單亭館東風怕倚欄一夜好春吹作恨棃花寂寞雨鳩寒題可宗壁間墨梅澤癯山嶝月明中筆底精神擅化工老榦踈花生意在紛紛開謝任東風春愁一春多為惜春愁無柰鵑聲呌不休最是惡懐難著處落花風雨五更頭幽興囬首紅塵已息機雲山應不負心期晚來散歩清溪上䇿杖長歌覔紫芝其二幽居無事總忘形草緑柴扉晝不扄柏子香消清晝永閒凴琴几寫黄庭其三芳草池塘夢恵連臨風得句忽清圓年來每愧天才短袖裏應無筆似椽其四閉門不出動十日雨後慿欄眼倍眀萬樹飛花將欲盡一池春水漲浮萍其五束書屏迹住山中白髮蒼顔見老翁門外黄塵深似海一家桃李自春風讀易至理從來無古今後人刪註轉迷沉遺經獨抱加潛玩始識羲文廣大心南窗南窗不受北風寒筆硯供吟對景安最喜手扳簷外竹雪中尤勝作花看題睡漁圗拍岸驚濤喚不醒輕鷗分夢下遥汀緑蓑自擁蘆花月應怪羊裘動客星題耕雲圗亂石吹雲出曉溪又随流水到春畦無心夢到商林去自在山中足一犁子猷乗興圗月照梅花雪㸃春小舟危坐醉中身一時為愛溪山去本是無心見故人和靖索句圗聳兩肩寒痩不禁東風獨立久沉吟山童莫放催歸鶴正與梅花論苦心美人圖綵雲宫殿月䦨干翠袖春風倚暮寒馬上琵琶愁未已不須重展畫圗看内人燒香圗小院鈎簾拜月明暗将心語達微誠妾身不願承㤙重願保君王樂太平趙昌海棠圗銀燭燒殘夢未囬舊家庭院已荒苔玉簫聲杳人何處惟有東風燕子來徐熈牡丹圗翠幄籠霞䕶曉寒無人凝笑倚欄干玉環去後千年恨留與東風作夢看夏圭江天霽雪圗小舟和雪載梅花水氣吹寒拂鬢華妙處人琴忘已久不知乗興到誰家真妃吹玉簫圖此聲不許鳳凰知誰遣豬龍耳畔吹吹到綵雲驚散處㫁腸聲在落花枝團扇詞莫恨秋風入女墻恩情中道易凄涼人間縱有春風樂歌罷桃花亦㫁腸探梅乗興扶藜過石橋地平不覺萬山高庭前一樹梅花白疑是春隂雪未消溪頭晚歸野店春寒酒力㣲溪雲吹濕上人衣山童不顧肩書重猶折梅花帶雪歸幽興燕子飛來近畫簷暮春時節雨纎纎杏花落盡無情緒何處人家有酒帘范增舞劍鴻門計不成咸陽歸路楚愁生子房玉斗空撞碎柰有陳平四萬金蘇武北海寒深雪滿天邊雲漠漠漢雲連将軍不是麒麟種争伴羝羊十九年題蒲萄漢使當年得種囬至今中國受栽培秋風馬乳顆顆熟正可盈缸釀緑醅青村遺稿
