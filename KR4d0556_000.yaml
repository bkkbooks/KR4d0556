body:
  text: 青村遺稿别集類四元提要臣等謹案青村遺稿一卷元金涓撰涓字徳原義烏人本姓劉先世避錢武肅王鏐嫌名改姓金受業許謙之門復從黄溍游宋濓王禕皆其同學也累辭薦辟教授青村著有文集四十卷明初已佚是編乃其六世孫魁七世孫江等蒐羅散逸綴輯而成詩格清和婉約雖乏縱横排奡之才而格調舂容自諧雅度嘗有和王禕詩一百九十韻極為宋濓所稱今不見於集中則其所存者殆亦千百之什一矣乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4864d3a5d48d12a374ae331bd7eaa7663f66ae35d3a771090bcb079c005a506c
